name: Build Windows EXE

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name text-paster --collect-all pystray --hidden-import=pystray --hidden-import=PIL --hidden-import=models --hidden-import=hotkey_manager --hidden-import=tray_manager --collect-all pynput main.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: text-paster-windows
        path: dist/text-paster.exe

name: Build Windows EXE

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller text-paster.spec

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: text-paster-windows
        path: dist/text-paster.exe

    - name: Delete old prebuilt Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: 'prebuilt'
            });
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id
            });
            console.log('Deleted old release');
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
            console.log('No existing release found');
          }
          try {
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'tags/prebuilt'
            });
            console.log('Deleted old tag');
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
            console.log('No existing tag found');
          }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Prebuilt Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: prebuilt
        name: Prebuilt Release
        body: "Latest prebuilt version of text-paster.exe"
        draft: false
        prerelease: true
        files: dist/text-paster.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
